<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <title>Add Toll Passage - dodaj prolazak</title>
</head>
<body>
<div class="page">
<h1>Dodaj prolazak preko NP</h1>

<form th:action="@{/passages}" th:object="${tollpassageDTO}" method="post">

    <label>NP:</label>

    <select th:field="*{tollboothId}">
        <option value="">Odaberi NP...</option>
        <option th:each="tollbooth : ${tollbooths}"
                th:value="${tollbooth.id}"
                th:text="${tollbooth.ime}">
        </option>
    </select>

    <p th:if="${#fields.hasErrors('tollboothId')}"
       th:errors="*{tollboothId}">
    </p>

    <br><br>

    <label>Auto:</label>

    <select th:field="*{carId}">
        <option value="">Odaberi auto...</option>
        <option th:each="car : ${cars}"
                th:value="${car.id}"
                th:text="${car.registracija}">
        </option>
    </select>

    <p th:if="${#fields.hasErrors('carId')}"
       th:errors="*{carId}">
    </p>

    <br><br>

    <button type="submit">Spremi</button>

</form>

<br>

<a th:href="@{/passages}">Natrag na proklaske</a>
</div>
</body>
</html>
